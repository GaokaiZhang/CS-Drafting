name: Deploy UI

on:
  # Pages is not currently enabled for this repository, and the default
  # GITHUB_TOKEN cannot create the Pages site. Keep the deploy workflow
  # manual-only so normal pushes do not fail until Pages is enabled in
  # repository settings.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static UI
        uses: actions/upload-pages-artifact@v3
        with:
          path: ui

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
