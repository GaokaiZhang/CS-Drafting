<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Speculative Decoding Inspector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Speculative Decoding Inspector</h1>
          <p class="subtitle">ACSD traces, adaptive switching metrics, and naive speculative decoding comparison.</p>
        </div>
        <div class="controls">
          <label>
            <span class="muted">Server artifact</span><br>
            <select id="server-result-select" class="select-control"></select>
          </label>
          <button id="load-server-result" class="secondary-button">Load Server Result</button>
          <label class="file-picker">
            <span>Load Result JSON</span>
            <input id="file-input" type="file" accept="application/json">
          </label>
          <button id="load-demo" class="secondary-button">Load Demo Data</button>
        </div>
      </header>

      <section class="hero-band">
        <img
          alt="Colored token blocks representing small, middle, and large model stages"
          src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw=="
        >
        <div class="hero-copy">
          <div id="status-pill" class="status-pill">Starting Flask UI</div>
          <p id="config-summary" class="config-summary">The latest ACSD comparison artifact will load automatically when available.</p>
        </div>
      </section>

      <nav class="tabs" aria-label="Inspector sections">
        <button class="tab-button active" data-tab="overview">Overview</button>
        <button class="tab-button" data-tab="baseline">Baseline</button>
        <button class="tab-button" data-tab="cascaded">Cascaded</button>
        <button class="tab-button" data-tab="adaptive">Adaptive</button>
      </nav>

      <main class="content-grid">
        <section id="overview" class="tab-panel active"></section>
        <section id="baseline" class="tab-panel"></section>
        <section id="cascaded" class="tab-panel"></section>
        <section id="adaptive" class="tab-panel"></section>
      </main>
    </div>

    <script src="{{ url_for('static', filename='demo_data.js') }}"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
